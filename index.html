<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumeet Saini - Digital Business Card</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1d2021;
            --bg-medium: #282828;
            --bg-light: #3c3836;
            --text-primary: #fbf1c7;
            --text-secondary: #d5c4a1;
            --accent: #d65d03;
            --accent-hover: #fe8019;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', 'SF Mono', Monaco, 'Cascadia Code', monospace;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-image:
                radial-gradient(ellipse at top, #2d2a24 0%, transparent 50%),
                radial-gradient(ellipse at bottom, #1a1815 0%, transparent 50%);
        }

        .card {
            background: var(--bg-medium);
            border: 1px solid var(--bg-light);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .photo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.25rem;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--bg-light);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .brand {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--bg-light), transparent);
            margin: 1.5rem 0;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.875rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--bg-light);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .link:hover {
            background: var(--bg-light);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .link svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            fill: var(--accent);
        }

        .link-text {
            display: flex;
            flex-direction: column;
        }

        .link-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .link-value {
            font-size: 0.875rem;
        }

        .link:hover .link-value {
            color: var(--accent-hover);
        }

        .vcard-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.875rem;
            background: transparent;
            border: 1px dashed var(--bg-light);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .vcard-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(214, 93, 3, 0.1);
        }

        .vcard-btn svg {
            width: 16px;
            height: 16px;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--bg-light);
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }

            .name {
                font-size: 1.5rem;
            }

            .photo-container {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="photo-container">
                <!-- Using a relative path - will copy the face.jpg to this service -->
                <img src="face.jpg" alt="Sumeet Saini">
            </div>
            <h1 class="name">Sumeet Saini</h1>
            <p class="title">Full Stack Developer & Designer</p>
            <p class="brand">Reliq Digital</p>
        </div>

        <div class="divider"></div>

        <div class="links">
            <!-- Email -->
            <a href="mailto:sumeet@sumeetsaini.com" class="link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
                <div class="link-text">
                    <span class="link-label">Email</span>
                    <span class="link-value">sumeet@sumeetsaini.com</span>
                </div>
            </a>

            <!-- LinkedIn -->
            <a href="https://linkedin.com/in/sumeetsaini" target="_blank" rel="noopener" class="link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/>
                </svg>
                <div class="link-text">
                    <span class="link-label">LinkedIn</span>
                    <span class="link-value">linkedin.com/in/sumeetsaini</span>
                </div>
            </a>

            <!-- Website -->
            <a href="https://sumeetsaini.com" target="_blank" rel="noopener" class="link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <div class="link-text">
                    <span class="link-label">Website</span>
                    <span class="link-value">sumeetsaini.com</span>
                </div>
            </a>

            <!-- Reliq Digital -->
            <a href="https://reliq.digital" target="_blank" rel="noopener" class="link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <div class="link-text">
                    <span class="link-label">Freelance Business</span>
                    <span class="link-value">reliq.digital</span>
                </div>
            </a>

            <!-- GitHub -->
            <a href="https://github.com/kungfusaini" target="_blank" rel="noopener" class="link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
                </svg>
                <div class="link-text">
                    <span class="link-label">GitHub</span>
                    <span class="link-value">github.com/kungfusaini</span>
                </div>
            </a>
        </div>

        <!-- Download vCard Button -->
        <button class="vcard-btn" onclick="downloadVCard()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Save to Contacts
        </button>

        <div class="footer">
            card.sumeetsaini.com
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vCardData = `BEGIN:VCARD
VERSION:3.0
FN:Sumeet Saini
TITLE:Full Stack Developer & Designer
ORG:Reliq Digital
URL:https://sumeetsaini.com
URL:https://reliq.digital
URL:https://linkedin.com/in/sumeetsaini
EMAIL:sumeet@sumeetsaini.com
END:VCARD`;

            const blob = new Blob([vCardData], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Sumeet-Saini.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
