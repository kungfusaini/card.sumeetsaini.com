<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumeet Saini - Digital Business Card</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: "ProFontIIx";
            src: url("ProFontIIx-subset.woff2") format("woff2");
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        :root {
            --bg-dark: #1d2021;
            --bg-medium: #282828;
            --bg-light: #3c3836;
            --text-primary: #fbf1c7;
            --text-secondary: #d5c4a1;
            --accent: #d65d03;
            --accent-hover: #fe8019;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ProFontIIx', 'IBM Plex Mono', 'SF Mono', Monaco, 'Cascadia Code', monospace;
            background: var(--bg-dark);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-x: hidden;
            margin: 0;
        }

        .card {
            background: var(--bg-medium);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
        }

        

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .photo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.25rem;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--bg-light);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .brand {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--bg-light), transparent);
            margin: 1.5rem 0;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.875rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--bg-light);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .link:hover {
            background: var(--bg-light);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .link svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            fill: var(--accent);
        }

        .link-text {
            display: flex;
            flex-direction: column;
        }

        .link-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        .link-value {
            font-size: 0.875rem;
        }

        .link:hover .link-value {
            color: var(--accent-hover);
        }

        .vcard-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.875rem;
            background: transparent;
            border: 1px dashed var(--bg-light);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .vcard-btn:hover {
            border-color: var(--accent);
            border-style: solid;
            color: var(--accent);
            transform: translateY(-2px);
        }

        .vcard-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--accent);
        }

        .vcard-btn:hover svg {
            fill: var(--accent);
        }

        .share-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding: 0.875rem;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .share-btn:hover {
            background: var(--accent-hover);
        }

        .share-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--text-primary);
        }

        .share-btn.copied {
            background: #458a56;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--bg-light);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 1px solid var(--bg-light);
            transition: all 0.2s ease;
        }

        .social-icons a:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .social-icons svg {
            width: 22px;
            height: 22px;
            fill: var(--text-secondary);
        }

        .social-icons a:hover svg {
            fill: var(--accent);
        }

        .share-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 1px solid var(--bg-light);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .share-icon-btn:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .share-icon-btn svg {
            width: 22px;
            height: 22px;
            fill: var(--text-secondary);
        }

        .share-icon-btn:hover svg {
            fill: var(--accent);
        }

        .share-icon-btn.copied {
            border-color: #458a56;
        }

        .share-icon-btn.copied svg {
            fill: #458a56;
        }

        /* QR Modal */
        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .qr-modal.show {
            display: flex;
        }

        .qr-content {
            background: var(--bg-medium);
            border: 1px solid var(--bg-light);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            position: relative;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .qr-content h3 {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-family: 'ProFontIIx', 'IBM Plex Mono', monospace;
        }

        .qr-image {
            width: 200px;
            height: 200px;
            border-radius: 8px;
            border: 2px solid var(--bg-light);
        }

        .qr-url {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 1rem;
            font-family: 'ProFontIIx', 'IBM Plex Mono', monospace;
        }

        .qr-close {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .qr-close:hover {
            background: var(--bg-light);
        }

        .qr-close svg {
            width: 24px;
            height: 24px;
            fill: var(--text-secondary);
        }

        .qr-close:hover svg {
            fill: var(--text-primary);
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }

            .name {
                font-size: 1.5rem;
            }

            .photo-container {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="photo-container">
                <!-- Using a relative path - will copy the face.jpg to this service -->
                <img src="face.jpg" alt="Sumeet Saini">
            </div>
            <h1 class="name">Sumeet Saini</h1>
            <p class="title">AI & Full Stack Developer</p>
        </div>

        <div class="divider"></div>

        <div class="links">
            <!-- Email -->
            <a href="mailto:hi@sumeetsaini.com" class="link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

                    <span class="link-label">Email</span>

            <!-- Website -->
            <a href="https://sumeetsaini.com" target="_blank" rel="noopener" class="link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>

                    <span class="link-label">Website</span>
                    <span class="link-value">sumeetsaini.com</span>
                </div>
            </a>

            <!-- Reliq Digital -->
            <a href="https://reliq.digital" target="_blank" rel="noopener" class="link">
                <svg width="20" height="20" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <path d="m 249.61738,12.693799 c -7.51037,-1.3e-5 -15.02071,1.711113 -20.81992,5.133537 -40.53471,23.921699 -129.599654,75.343718 -170.583899,98.487004 -11.727084,6.62215 -20.949036,22.59443 -20.820434,36.06137 0.449443,47.06494 0.449442,149.90846 0,196.97351 -0.128602,13.46702 9.092895,29.43926 20.819918,36.06137 40.984156,23.14323 130.049625,74.56474 170.584415,98.48649 11.59849,6.84488 30.04142,6.84485 41.63984,0 18.32902,-10.81693 46.58081,-27.25657 75.82328,-44.16217 L 241.71244,308.16878 228.18561,321.10701 v 61.75127 H 173.49179 V 117.62176 h 58.81089 l 129.38331,88.8044 -82.33502,68.80872 115.04982,136.76736 c 18.08843,-10.38073 34.46798,-19.72933 46.62042,-26.59165 11.72708,-6.62214 20.94851,-22.59442 20.81992,-36.06137 -0.44946,-47.06494 -0.44946,-149.90846 0,-196.97351 0.12859,-13.46702 -9.09291,-29.43926 -20.81992,-36.06137 C 400.03704,93.171107 310.9721,41.749602 270.4373,17.827853 264.63806,14.40541 257.12775,12.693811 249.61738,12.693799 Z M 227.00946,169.96327 v 84.68785 l 54.10574,-44.6965 z"/>
                </svg>
                <div class="link-text">
                    <span class="link-label">Freelance Work</span>
                    <span class="link-value">reliq.digital</span>
                </div>
            </a>
        </div>

        <!-- Download vCard Button -->
        <button class="vcard-btn" onclick="downloadVCard()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Save to Contacts
        </button>

        <!-- Social Icons -->
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/sumeet-saini-com/" target="_blank" rel="noopener" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/>
                </svg>
            </a>
            <a href="https://github.com/kungfusaini" target="_blank" rel="noopener" aria-label="GitHub">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
                </svg>
            </a>
            <button class="share-icon-btn" onclick="copyLink()" id="shareBtn" aria-label="Share link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
                </svg>
            </button>
            <button class="share-icon-btn" onclick="showQRCode()" aria-label="Show QR Code">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13 2h-2v2h2v-2zm2-2h2v2h-2v-2zm-4 0h2v2h-2v-2zm2 4h2v2h-2v-2zm2 2h2v2h-2v-2zm-4-4h2v2h-2v-2zm2 4h2v2h-2v-2zm2-4h2v2h-2v-2z"/>
                </svg>
            </button>
        </div>

        <!-- QR Code Modal -->
        <div class="qr-modal" id="qrModal" onclick="hideQRCode()">
            <div class="qr-content" onclick="event.stopPropagation()">
                <button class="qr-close" onclick="hideQRCode()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
                <h3>Scan to Connect</h3>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://card.sumeetsaini.com&bgcolor=1d2021&color=fbf1c7&margin=0" alt="QR Code" class="qr-image">
                <p class="qr-url">card.sumeetsaini.com</p>
            </div>
        </div>

        
    </div>

<script>
        function downloadVCard() {
            const vCardData = `BEGIN:VCARD
 VERSION:3.0
 FN:Sumeet Saini
 TITLE:Full Stack Developer & Designer
 ORG:Reliq Digital
 URL:https://sumeetsaini.com
 URL:https://reliq.digital
 URL:https://www.linkedin.com/in/sumeet-saini-com/
 EMAIL:hi@sumeetsaini.com
 END:VCARD`;

            const blob = new Blob([vCardData], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Sumeet-Saini.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('shareBtn');
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function showQRCode() {
            document.getElementById('qrModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function hideQRCode() {
            document.getElementById('qrModal').classList.remove('show');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
